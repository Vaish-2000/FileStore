<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enterprise File Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input[type="file"] {
      margin-bottom: 20px;
    }
    progress {
      width: 100%;
      height: 20px;
    }
    .status {
      margin-top: 10px;
      font-weight: bold;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #fafafa; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Upload Your File</h2>
    <form id="uploadForm">
      <input type="file" id="fileInput" name="file" required />
      <br />
      <button type="submit">Upload</button>
    </form>
    <progress id="progressBar" value="0" max="100"></progress>
    <div class="status" id="statusText"></div>

    <h3>Files</h3>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Size (bytes)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="filesBody">
      </tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const progressBar = document.getElementById('progressBar');
    const statusText = document.getElementById('statusText');
    const filesBody = document.getElementById('filesBody');

    function loadFiles() {
      fetch('Friends/files')
        .then(r => r.json())
        .then(list => {
          filesBody.innerHTML = '';
          list.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${item.index}</td>
              <td>${item.name}</td>
              <td>${item.size}</td>
              <td>
                <a href="Friends/files/download/${item.index}">Download</a>
              </td>
            `;
            filesBody.appendChild(tr);
          })
        })
        .catch(() => {
          filesBody.innerHTML = '<tr><td colspan="4">Failed to load files</td></tr>';
        });
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const file = fileInput.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', 'Friends/files/upload', true);

      xhr.upload.onprogress = function (e) {
        if (e.lengthComputable) {
          const percentComplete = (e.loaded / e.total) * 100;
          progressBar.value = percentComplete;
          statusText.textContent = `Uploading: ${Math.round(percentComplete)}%`;
        }
      };

      xhr.onload = function () {
        if (xhr.status === 200) {
          statusText.textContent = '✅ Upload successful!';
          loadFiles();
          fileInput.value = '';
          progressBar.value = 0;
        } else {
          statusText.textContent = `❌ Upload failed: ${xhr.responseText}`;
        }
      };

      xhr.onerror = function () {
        statusText.textContent = '❌ Network error during upload.';
      };

      xhr.send(formData);
    });

    loadFiles();
  </script>
</body>
</html>
